name: 偵測原站更新並通知

on:
  schedule:
    # 每天台灣時間早上 8 點（UTC 00:00）執行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下載原站 HTML
        run: curl -s https://cc.storyfox.cz/ -o /tmp/original.html

      - name: 比對版本並開 Issue 通知
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=$(grep -oP '(?<=Claude Code v)[0-9.]+' /tmp/original.html | head -1)
          OLD_VERSION=$(grep -oP '(?<=Claude Code v)[0-9.]+' index.html | head -1)
          NEW_DATE=$(grep -oP '(?<=Last updated: )[^<]+' /tmp/original.html | head -1)

          echo "原站版本：$NEW_VERSION（目前：$OLD_VERSION）"

          if [ "$NEW_VERSION" = "$OLD_VERSION" ]; then
            echo "版本相同，無需更新"
            exit 0
          fi

          # 擷取新的 changelog 內容
          CHANGELOG=$(python3 - <<'PYEOF'
import re, sys

with open('/tmp/original.html') as f:
    html = f.read()

m = re.search(r'<ul class="changelog-list">(.*?)</ul>', html, re.DOTALL)
if not m:
    print("（無 changelog）")
    sys.exit(0)

items = re.findall(r'<li>(.*?)</li>', m.group(1), re.DOTALL)
for item in items:
    # 移除 HTML 標籤，只保留文字
    text = re.sub(r'<[^>]+>', '', item).strip()
    print(f"- {text}")
PYEOF
          )

          # 確認是否已有相同版本的 Issue（避免重複開）
          EXISTING=$(gh issue list --repo $GITHUB_REPOSITORY \
            --label "sync" --state open \
            --json title --jq ".[] | select(.title | contains(\"$NEW_VERSION\")) | .title")

          if [ -n "$EXISTING" ]; then
            echo "已有此版本的 Issue，跳過"
            exit 0
          fi

          # 開新 Issue
          gh issue create \
            --repo $GITHUB_REPOSITORY \
            --title "🔔 原站更新：Claude Code v$NEW_VERSION（原 v$OLD_VERSION）" \
            --label "sync" \
            --body "## 原站偵測到版本更新

**新版本：** \`v$NEW_VERSION\`
**舊版本：** \`v$OLD_VERSION\`
**更新日期：** $NEW_DATE

### 原站 Changelog

$CHANGELOG

---

### 處理方式

請到 Claude Code 告訴 Claude：
> 「原站更新了，幫我更新 https://github.com/$GITHUB_REPOSITORY 的中文版」

Claude 會自動比對差異並翻譯更新。

- 原站：https://cc.storyfox.cz/
- 中文版：https://rtsai1202.github.io/claude-code-cheatsheet-zh/"
