name: 偵測原站更新並通知

on:
  schedule:
    # 每天台灣時間早上 8 點（UTC 00:00）執行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 比對版本並開 Issue 通知
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/check-and-notify.sh
